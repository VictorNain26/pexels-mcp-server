name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src

      - name: Run tests with coverage
        # Threshold tracks the floor under which a regression should fail
        # CI. Ratchet it up by hand after each meaningful coverage gain.
        run: uv run pytest -q --cov=src/pexels_mcp_server --cov-report=term-missing --cov-fail-under=75

  security-audit:
    # Dependency CVE scan. Runs alongside the unit-test matrix so a freshly
    # disclosed vulnerability in mcp / httpx / pydantic / uvicorn fails CI
    # on the next push instead of waiting for Dependabot's weekly cadence.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Export locked requirements
        # pip-audit cannot audit the editable local project ("pexels-mcp"),
        # so we export the third-party deps to a requirements file and
        # audit only that. --no-emit-project skips the project itself;
        # --no-editable strips the editable marker; --disable-pip on
        # pip-audit keeps the audit fully offline-friendly.
        run: uv export --format requirements-txt --no-emit-project --no-editable --no-header -o audit-requirements.txt

      - name: Run pip-audit on the locked dependency set
        # PYSEC-2025-183 ("pyjwt weak encryption") is publicly disputed
        # by the upstream maintainers: the advisory hinges on the calling
        # application picking a too-short HMAC key, which is the
        # application's responsibility, not the library's. The advisory
        # has no fix version. This server does not emit JWTs at all —
        # access tokens are opaque ``mcp_<hex>`` strings minted by our
        # OAuth provider — so the disputed vector is not reachable here.
        # Remove this ignore when the advisory is rejected upstream or
        # a fixed release lands.
        run: |
          uv run pip-audit --strict -r audit-requirements.txt --disable-pip \
            --ignore-vuln PYSEC-2025-183

  docker-build:
    # Validate the Dockerfile builds end-to-end. Catches Dockerfile regressions
    # (broken layer cache, missing files, COPY ordering) on every PR rather
    # than discovering them at Koyeb deploy time. No push, no registry.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: pexels-mcp-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image entrypoint
        # The container must start, write its expected stderr, and exit
        # cleanly when boot is refused. Catches regressions in __main__.
        run: |
          set -e
          # HTTP mode without MCP_SERVER_URL must exit code 2.
          docker run --rm \
            -e TRANSPORT=streamable-http \
            pexels-mcp-server:ci 2>&1 \
            | tee /tmp/refuse.log || true
          grep -q "Missing required env var in streamable-http mode" /tmp/refuse.log
          grep -q "MCP_SERVER_URL" /tmp/refuse.log

          # HTTP mode with MCP_SERVER_URL set must boot and write the
          # startup line. The container is NOT started with --rm so that
          # `docker logs` keeps working even if the process exits before
          # our assertion runs — otherwise a fast crash deletes the logs
          # we need to diagnose the failure.
          docker run -d --name smoke \
            -e TRANSPORT=streamable-http \
            -e HOST=0.0.0.0 \
            -e PORT=8000 \
            -e MCP_SERVER_URL=http://127.0.0.1:8000 \
            pexels-mcp-server:ci
          sleep 5
          docker ps -a --filter name=smoke --format '{{.Status}}'
          docker logs smoke 2>&1 | tee /tmp/boot.log || true
          docker rm -f smoke || true
          grep -q "Starting pexels-mcp-server on streamable-http" /tmp/boot.log
