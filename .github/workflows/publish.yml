# PyPI publish workflow.
#
# Fires on a semver tag pushed to the repository (`vX.Y.Z`). The publish job
# only runs after the test/lint/typecheck matrix passes on the tagged commit
# and after a reviewer approves the `pypi` deployment environment in GitHub
# Settings. Manual dispatch is also allowed for emergency releases but goes
# through the same gates.
#
# Setup checklist (one-time, done outside Git):
#   1. Create the `pexels-mcp` project on PyPI.
#   2. Add a Trusted Publisher entry for this repo + this workflow filename.
#   3. Create a GitHub deployment environment named `pypi` with required
#      reviewers.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
