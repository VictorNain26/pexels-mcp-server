<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Pexels search results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --fg: #111111;
            --muted: #666666;
            --border: #e5e5e5;
            --accent: #4a9eff;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0d0d0d; --fg: #e8e8e8; --muted: #999999; --border: #2a2a2a; }
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 16px;
            line-height: 1.4;
        }
        .placeholder {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            padding: 32px 16px;
        }
        .error {
            text-align: center;
            color: #c0392b;
            font-size: 13px;
            padding: 16px;
            border: 1px solid #c0392b;
            border-radius: 6px;
            margin: 16px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }
        .card .thumb-wrap {
            position: relative;
            aspect-ratio: 1 / 1;
            background: var(--border);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.65);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }
        .card .meta { padding: 8px 10px; font-size: 12px; }
        .card .alt {
            color: var(--fg);
            margin: 0 0 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .author {
            color: var(--muted);
            font-size: 11px;
            margin: 0;
        }
        .card a {
            color: var(--accent);
            text-decoration: none;
        }
        .card a:hover { text-decoration: underline; }
        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="placeholder">Initializing…</div>
    </div>
    <script>
        // MCP Apps UI for the Pexels MCP server.
        //
        // Implements the wire protocol defined in MCP Apps spec 2026-01-26
        // (https://apps.extensions.modelcontextprotocol.io/). The view acts
        // as an MCP client over postMessage:
        //   1. send `ui/initialize` request to the host, wait for response
        //   2. send `ui/notifications/initialized` notification
        //   3. wait for `ui/notifications/tool-result` from the host
        //   4. parse the CallToolResult, extract the JSON envelope from the
        //      first TextContent block, render a responsive grid
        //   5. report content size back via `ui/notifications/size-changed`
        //
        // Every DOM node is built with createElement + textContent so no
        // attacker-supplied string ever reaches innerHTML.

        const PROTOCOL_VERSION = "2026-01-26";
        const APP_NAME = "pexels-results-grid";
        const APP_VERSION = "1.0.0";

        const root = document.getElementById("root");

        // --------------------------------------------------------- transport

        let nextRequestId = 1;
        const pendingRequests = new Map();

        function sendRequest(method, params) {
            const id = nextRequestId++;
            return new Promise((resolve, reject) => {
                pendingRequests.set(id, { resolve, reject });
                window.parent.postMessage(
                    { jsonrpc: "2.0", id, method, params },
                    "*"
                );
            });
        }

        function sendNotification(method, params) {
            window.parent.postMessage(
                { jsonrpc: "2.0", method, params: params || {} },
                "*"
            );
        }

        window.addEventListener("message", (event) => {
            const msg = event.data;
            if (!msg || msg.jsonrpc !== "2.0") return;
            // Response to a request we sent.
            if (msg.id != null && (msg.result !== undefined || msg.error !== undefined)) {
                const handler = pendingRequests.get(msg.id);
                if (handler) {
                    pendingRequests.delete(msg.id);
                    if (msg.error) handler.reject(msg.error);
                    else handler.resolve(msg.result);
                }
                return;
            }
            // Notification from host (or request — we don't expose any handler
            // for host→view requests at the moment).
            if (typeof msg.method === "string") {
                handleNotification(msg.method, msg.params || {});
            }
        });

        function handleNotification(method, params) {
            switch (method) {
                case "ui/notifications/tool-result":
                    renderCallToolResult(params);
                    break;
                case "ui/notifications/tool-input":
                case "ui/notifications/tool-input-partial":
                    // We could show a "loading…" hint with the query, but
                    // we wait for the actual result to render anything.
                    break;
                case "ui/resource-teardown":
                    // Acknowledge and stop work. The host will unmount us.
                    setPlaceholder("Closed.");
                    break;
                case "ui/notifications/host-context-changed":
                    // Theme/locale changes — the CSS uses `prefers-color-scheme`
                    // already, nothing extra to do.
                    break;
                default:
                    // unknown notification, ignore
                    break;
            }
        }

        // ------------------------------------------------------------ render

        function clearRoot() {
            while (root.firstChild) root.removeChild(root.firstChild);
        }

        function setPlaceholder(text) {
            clearRoot();
            const div = document.createElement("div");
            div.className = "placeholder";
            div.textContent = text;
            root.appendChild(div);
            reportSize();
        }

        function setError(text) {
            clearRoot();
            const div = document.createElement("div");
            div.className = "error";
            div.textContent = text;
            root.appendChild(div);
            reportSize();
        }

        function buildCard({ thumbUrl, alt, author, authorUrl, pageUrl, badge }) {
            const card = document.createElement("div");
            card.className = "card";

            const thumbWrap = document.createElement("div");
            thumbWrap.className = "thumb-wrap";
            const imgLink = document.createElement("a");
            imgLink.href = pageUrl || "#";
            imgLink.target = "_blank";
            imgLink.rel = "noopener noreferrer";
            const img = document.createElement("img");
            img.src = thumbUrl || "";
            img.alt = alt || "";
            img.loading = "lazy";
            imgLink.appendChild(img);
            thumbWrap.appendChild(imgLink);
            if (badge) {
                const b = document.createElement("span");
                b.className = "badge";
                b.textContent = badge;
                thumbWrap.appendChild(b);
            }
            card.appendChild(thumbWrap);

            const meta = document.createElement("div");
            meta.className = "meta";
            const altP = document.createElement("p");
            altP.className = "alt";
            altP.textContent = alt || "(no description)";
            meta.appendChild(altP);
            const authorP = document.createElement("p");
            authorP.className = "author";
            authorP.appendChild(document.createTextNode("by "));
            const authorLink = document.createElement("a");
            authorLink.href = authorUrl || "#";
            authorLink.target = "_blank";
            authorLink.rel = "noopener noreferrer";
            authorLink.textContent = author || "unknown";
            authorP.appendChild(authorLink);
            meta.appendChild(authorP);
            card.appendChild(meta);

            return card;
        }

        function photoToCard(p) {
            return buildCard({
                thumbUrl: typeof p.thumbnail_url === "string" ? p.thumbnail_url : p.image_url,
                alt: typeof p.alt === "string" ? p.alt : "",
                author: typeof p.photographer === "string" ? p.photographer : "",
                authorUrl: typeof p.photographer_url === "string" ? p.photographer_url : "",
                pageUrl: typeof p.page_url === "string" ? p.page_url : "",
                badge: null,
            });
        }

        function videoToCard(v) {
            const dur = Number.isFinite(v.duration_seconds) ? `${v.duration_seconds}s` : "video";
            return buildCard({
                thumbUrl: typeof v.preview_image_url === "string" ? v.preview_image_url : "",
                alt: typeof v.alt === "string" ? v.alt : `Video (${v.width}x${v.height})`,
                author: typeof v.uploader_name === "string" ? v.uploader_name : "",
                authorUrl: typeof v.uploader_url === "string" ? v.uploader_url : "",
                pageUrl: typeof v.page_url === "string" ? v.page_url : "",
                badge: dur,
            });
        }

        function renderItems(items, cardFactory) {
            if (!Array.isArray(items) || items.length === 0) {
                setPlaceholder("No matching results.");
                return;
            }
            clearRoot();
            const grid = document.createElement("div");
            grid.className = "grid";
            for (const item of items) {
                if (item && typeof item === "object") {
                    grid.appendChild(cardFactory(item));
                }
            }
            root.appendChild(grid);
            const footer = document.createElement("div");
            footer.className = "footer";
            footer.textContent =
                "Provided by Pexels — credit photographer/uploader when publishing.";
            root.appendChild(footer);
            reportSize();
        }

        function renderEnvelope(envelope) {
            // Collection media has both photos and videos. Show photos first,
            // then videos. Other endpoints expose only one key.
            const hasPhotos = Array.isArray(envelope.photos) && envelope.photos.length > 0;
            const hasVideos = Array.isArray(envelope.videos) && envelope.videos.length > 0;
            if (hasPhotos && hasVideos) {
                clearRoot();
                const grid = document.createElement("div");
                grid.className = "grid";
                for (const p of envelope.photos) {
                    if (p && typeof p === "object") grid.appendChild(photoToCard(p));
                }
                for (const v of envelope.videos) {
                    if (v && typeof v === "object") grid.appendChild(videoToCard(v));
                }
                root.appendChild(grid);
                const footer = document.createElement("div");
                footer.className = "footer";
                footer.textContent =
                    "Provided by Pexels — credit photographer/uploader when publishing.";
                root.appendChild(footer);
                reportSize();
            } else if (hasPhotos) {
                renderItems(envelope.photos, photoToCard);
            } else if (hasVideos) {
                renderItems(envelope.videos, videoToCard);
            } else {
                setPlaceholder("No matching results.");
            }
        }

        function renderCallToolResult(callToolResult) {
            if (!callToolResult || typeof callToolResult !== "object") {
                setError("Invalid tool result envelope.");
                return;
            }
            if (callToolResult.isError === true) {
                setError("Tool reported an error. See the conversation for details.");
                return;
            }
            const blocks = Array.isArray(callToolResult.content) ? callToolResult.content : [];
            for (const block of blocks) {
                if (block && block.type === "text" && typeof block.text === "string") {
                    let parsed;
                    try {
                        parsed = JSON.parse(block.text);
                    } catch (_) {
                        continue;
                    }
                    if (parsed && typeof parsed === "object") {
                        renderEnvelope(parsed);
                        return;
                    }
                }
            }
            setPlaceholder("Tool returned no structured results.");
        }

        // ------------------------------------------------------------- sizing

        function reportSize() {
            const rect = root.getBoundingClientRect();
            sendNotification("ui/notifications/size-changed", {
                width: Math.ceil(rect.width),
                height: Math.ceil(rect.height + 32), // account for body padding
            });
        }

        if (typeof ResizeObserver === "function") {
            new ResizeObserver(reportSize).observe(root);
        }

        // ------------------------------------------------------------- init

        async function init() {
            try {
                await sendRequest("ui/initialize", {
                    protocolVersion: PROTOCOL_VERSION,
                    clientInfo: { name: APP_NAME, version: APP_VERSION },
                    appCapabilities: { availableDisplayModes: ["inline"] },
                });
                sendNotification("ui/notifications/initialized");
                setPlaceholder("Waiting for Pexels results…");
            } catch (e) {
                const msg = e && typeof e.message === "string" ? e.message : "unknown";
                setError("MCP App initialization failed: " + msg);
            }
        }

        init();
    </script>
</body>
</html>
